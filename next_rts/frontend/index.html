<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRIMOIRE RTS Prototype</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header>
        <h1>GRIMOIRE RTS — Seed Console</h1>
        <p>Score the Seed First • hidden PDE field • live GSM class</p>
      </header>
      <main>
        <canvas id="field" width="512" height="512"></canvas>
        <aside>
          <button id="score">Score Seed First</button>
          <button id="step">Advance Field</button>
          <pre id="report">Click “Score Seed First” to initialize.</pre>
        </aside>
      </main>
    </div>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
